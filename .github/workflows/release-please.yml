name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: rp
        with:
          skip-github-release: true
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Create GitHub Release
        if: ${{ steps.rp.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          TAG: ${{ steps.rp.outputs.tag_name }}
        run: |
          set -e
          VERSION="${TAG#v}"
          ESCAPED_VERSION=$(printf '%s' "${VERSION}" | sed 's/\./\\./g')
          NOTES=''
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[${ESCAPED_VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md || true)
          fi
          INSTALL="# Installation

          \`\`\`bash
          # Homebrew (macOS)
          brew install --cask thedavidweng/tap/zenodo-cli

          # Go (cross-platform)
          go install github.com/thedavidweng/zenodo-cli/cmd/zenodo@${TAG}
          \`\`\`"
          FULL_NOTES="${NOTES:-Release $TAG}

          ${INSTALL}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "${FULL_NOTES}"
