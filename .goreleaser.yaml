version: 2

builds:
  - main: ./cmd/zenodo
    binary: zenodo
    ldflags:
      - -s -w
      - -X github.com/thedavidweng/zenodo-cli/internal/cli.Version={{.Version}}
      - -X github.com/thedavidweng/zenodo-cli/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/thedavidweng/zenodo-cli/internal/cli.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: "zenodo_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  mode: append
  github:
    owner: thedavidweng
    name: zenodo-cli
  header: |
    ## What's Changed

    See the [changelog](https://github.com/thedavidweng/zenodo-cli/blob/main/CHANGELOG.md) for full details.
  footer: |
    **Full Changelog**: https://github.com/thedavidweng/zenodo-cli/compare/{{ .PreviousTag }}...{{ .Tag }}

    ---
    ### Installation

    **Homebrew (macOS/Linux):**
    ```
    brew tap thedavidweng/tap
    brew install zenodo
    ```

    **Go:**
    ```
    go install github.com/thedavidweng/zenodo-cli/cmd/zenodo@{{ .Tag }}
    ```

signs:
  - artifacts: checksum
    cmd: cosign
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.sbom.json"

brews:
  - name: zenodo
    repository:
      owner: thedavidweng
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/thedavidweng/zenodo-cli"
    description: "Agent-friendly CLI for Zenodo deposit management, file upload/download, and InvenioRDM API access"
    license: "Apache-2.0"
    install: |
      bin.install "zenodo"
    test: |
      system "#{bin}/zenodo", "version"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
