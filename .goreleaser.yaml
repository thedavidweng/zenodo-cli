version: 2

builds:
  - main: ./cmd/zenodo
    binary: zenodo
    ldflags:
      - -s -w
      - -X github.com/thedavidweng/zenodo-cli/internal/cli.Version={{.Version}}
      - -X github.com/thedavidweng/zenodo-cli/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/thedavidweng/zenodo-cli/internal/cli.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: "zenodo_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  groups:
    - title: "Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Documentation"
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "Maintenance"
      regexp: '^.*?(chore|refactor|style|test|ci)(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: "Dependencies"
      regexp: '^.*?(build|deps)(\([[:word:]]+\))??!?:.+$'
      order: 4
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore: release"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: thedavidweng
    name: zenodo-cli
  header: |
    ## What's Changed

    See the [changelog](https://github.com/thedavidweng/zenodo-cli/blob/main/CHANGELOG.md) for full details.
  footer: |
    **Full Changelog**: https://github.com/thedavidweng/zenodo-cli/compare/{{ .PreviousTag }}...{{ .Tag }}

    ---
    ### Installation

    **Homebrew (macOS/Linux):**
    ```
    brew tap thedavidweng/tap
    brew install zenodo
    ```

    **Go:**
    ```
    go install github.com/thedavidweng/zenodo-cli/cmd/zenodo@{{ .Tag }}
    ```

    **Verify checksum:**
    ```bash
    cosign verify-blob \
      --bundle checksums.txt.sig \
      --certificate-identity-regexp='https://github.com/thedavidweng/zenodo-cli' \
      --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \
      checksums.txt
    ```

signs:
  - artifacts: checksum
    cmd: cosign
    args:
      - sign-blob
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.sbom.json"

brews:
  - name: zenodo
    repository:
      owner: thedavidweng
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/thedavidweng/zenodo-cli"
    description: "Agent-friendly CLI for Zenodo deposit management, file upload/download, and InvenioRDM API access"
    license: "Apache-2.0"
    install: |
      bin.install "zenodo"
      generate_completions_from_executable(bin/"zenodo", "completion")
    test: |
      system "#{bin}/zenodo", "version"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
